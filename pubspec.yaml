name: saaei_auth
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.4.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logoNav.png
    - assets/authBG.png
    - assets/logo.png
    - assets/back-icon-white.png
    - assets/notification.png
    - assets/message.png
    - assets/user-nav.png

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo/Cairo-Regular.ttf
        - asset: fonts/Cairo/Cairo-Light.ttf
          weight: 300
        - asset: fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: fonts/Cairo/Cairo-Bold.ttf
          weight: 700
        - asset: fonts/Cairo/Cairo-Black.ttf
          weight: 900
